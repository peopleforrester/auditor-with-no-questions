# ABOUTME: CI/CD pipeline for validating infrastructure and application code
# ABOUTME: Runs tests, linting, and security scanning on pull requests and pushes

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  OPENTOFU_VERSION: "1.11.5"

jobs:
  python-tests:
    name: Python Tests & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Run ruff linter
        run: uv run ruff check src/ tests/

      - name: Run ruff formatter check
        run: uv run ruff format --check src/ tests/

      - name: Run mypy type checking
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short --cov

  yaml-validation:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -d relaxed \
            apps/ \
            bootstrap/ \
            demo/ \
            infrastructure/eksctl/

  kubernetes-validation:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install kube-linter
        run: |
          curl -LO https://github.com/stackrox/kube-linter/releases/download/v0.8.1/kube-linter-linux.tar.gz
          tar -xzf kube-linter-linux.tar.gz
          sudo mv kube-linter /usr/local/bin/

      - name: Run kube-linter on apps
        run: |
          kube-linter lint apps/ --config .kube-linter.yaml || true
        continue-on-error: true

      - name: Run kubectl dry-run validation
        run: |
          # Validate kustomize builds
          for dir in apps/namespaces apps/kyverno apps/argo-events apps/argo-workflows demo/target-app; do
            if [ -f "$dir/kustomization.yaml" ]; then
              echo "Validating $dir..."
              kubectl kustomize "$dir" > /dev/null
            fi
          done

  helm-validation:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Add Helm repos
        run: |
          helm repo add falcosecurity https://falcosecurity.github.io/charts
          helm repo add kyverno https://kyverno.github.io/kyverno
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

      - name: Validate Falco chart
        run: |
          helm template falco falcosecurity/falco \
            --version 7.0.0 \
            -f apps/falco/values.yaml \
            > /dev/null

      - name: Validate Falcosidekick chart
        run: |
          helm template falcosidekick falcosecurity/falcosidekick \
            --version 0.12.0 \
            -f apps/falcosidekick/values.yaml \
            > /dev/null

      - name: Validate Kyverno chart
        run: |
          helm template kyverno kyverno/kyverno \
            --version 3.6.2 \
            -f apps/kyverno/values.yaml \
            > /dev/null

      - name: Validate Argo Events chart
        run: |
          helm template argo-events argo/argo-events \
            --version 2.4.20 \
            > /dev/null

      - name: Validate Argo Workflows chart
        run: |
          helm template argo-workflows argo/argo-workflows \
            --version 0.45.0 \
            > /dev/null

  opentofu-validation:
    name: OpenTofu Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v6

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}

      - name: OpenTofu init
        run: tofu init -backend=false

      - name: OpenTofu validate
        run: tofu validate

      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Run tflint
        run: tflint --init && tflint

  opentofu-security:
    name: OpenTofu Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run trivy config scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'infrastructure/terraform'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  e2e-local:
    name: E2E Tests (Kind)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev --group e2e --locked

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: e2e-test
          config: tests/e2e/kind-config.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v --tb=short -x
        timeout-minutes: 15
