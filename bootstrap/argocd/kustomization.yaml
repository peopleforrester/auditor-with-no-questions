# ABOUTME: Kustomize configuration for ArgoCD 3.2.x installation
# ABOUTME: Installs ArgoCD with custom ConfigMap patches for 3.x settings

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  # ArgoCD 3.2.4 installation manifest
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.2.4/manifests/install.yaml

patches:
  - path: argocd-cm-patch.yaml
  - path: argocd-cmd-params-cm-patch.yaml

# Common labels for all resources
commonLabels:
  app.kubernetes.io/part-of: sovereign-compliance-demo
