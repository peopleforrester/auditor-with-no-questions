# ABOUTME: ApplicationSet that deploys all demo components with sync waves
# ABOUTME: Uses list generator to control deployment order via sync waves

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sovereign-demo-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          # Wave 0: Namespaces (deployed first)
          - name: namespaces
            namespace: argocd
            path: apps/namespaces
            wave: "0"

          # Wave 1: Kyverno (policies before workloads)
          - name: kyverno
            namespace: kyverno
            path: apps/kyverno
            wave: "1"

          # Wave 2: Monitoring stack
          - name: monitoring
            namespace: monitoring
            path: apps/monitoring
            wave: "2"

          # Wave 3: Event-driven infrastructure
          - name: argo-events
            namespace: argo-events
            path: apps/argo-events
            wave: "3"

          - name: argo-workflows
            namespace: argo-workflows
            path: apps/argo-workflows
            wave: "3"

          # Wave 4: Security detection
          - name: falco
            namespace: falco
            path: apps/falco
            wave: "4"

          - name: falcosidekick
            namespace: falco
            path: apps/falcosidekick
            wave: "4"

          # Wave 5: Demo applications
          - name: demo-app
            namespace: demo
            path: demo/target-app
            wave: "5"

  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{wave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default

      source:
        repoURL: https://github.com/peopleforrester/auditor-with-no-questions.git
        targetRevision: main
        path: "{{path}}"

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 2m
