# ABOUTME: Kube-linter configuration for CI validation
# ABOUTME: Excludes intentional policy violations in demo pods designed to trigger Falco

checks:
  # Exclude checks that demo pods intentionally violate to trigger Falco alerts
  exclude:
    - "no-read-only-root-fs"
    - "run-as-non-root"
    - "unset-cpu-requirements"
    - "unset-memory-requirements"

# Paths to ignore for specific checks
ignorePaths:
  # Demo scenarios contain intentionally insecure pods
  - "demo/scenarios/**"
  # Target app is designed to be vulnerable for demonstration
  - "demo/target-app/**"
