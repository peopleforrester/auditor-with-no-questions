# ABOUTME: Nginx configuration for demo target application
# ABOUTME: Configures nginx to run as non-root on port 8080

apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-target-nginx
  namespace: demo
  labels:
    app: demo-target
    app.kubernetes.io/name: demo-target
data:
  default.conf: |
    server {
        listen 8080;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /healthz {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
