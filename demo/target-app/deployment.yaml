# ABOUTME: Demo target application deployment
# ABOUTME: Simple nginx app for compliance scenario demonstrations

apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-target
  namespace: demo
  labels:
    app: demo-target
    app.kubernetes.io/name: demo-target
    app.kubernetes.io/component: web
    compliance.sovereign/monitored: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-target
  template:
    metadata:
      labels:
        app: demo-target
        app.kubernetes.io/name: demo-target
        compliance.sovereign/monitored: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 8080
              name: http

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: config
              mountPath: /etc/nginx/conf.d

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: config
          configMap:
            name: demo-target-nginx
