# ABOUTME: Target pod for shell access demo scenario
# ABOUTME: Simple nginx pod that can receive kubectl exec commands

apiVersion: v1
kind: Pod
metadata:
  name: demo-target
  namespace: demo
  labels:
    app: demo-target
    app.kubernetes.io/name: demo-target
    app.kubernetes.io/part-of: sovereign-compliance-demo
    app.kubernetes.io/managed-by: argocd
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        runAsNonRoot: false
