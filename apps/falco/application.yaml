# ABOUTME: ArgoCD Application for Falco 0.42.0 deployment
# ABOUTME: Uses Helm chart with modern-bpf driver configuration

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.14.0  # Falco 0.42.0
    helm:
      releaseName: falco
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: falco

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
