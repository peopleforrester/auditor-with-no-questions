# ABOUTME: CEL-based ValidatingPolicy requiring resource limits
# ABOUTME: Ensures containers have CPU and memory limits for stability

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resources
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires CPU and memory limits on all containers for resource governance.
      This prevents resource exhaustion and ensures predictable scheduling.
    compliance.sovereign-demo/frameworks: "NIS2,DORA,SOC2"
    compliance.sovereign-demo/controls: "NIS2-21,DORA-II,SOC2-CC7.2"
spec:
  validationFailureAction: Audit  # Start with Audit, move to Enforce
  background: true
  rules:
    - name: require-cpu-memory-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  compliance.sovereign-demo/enforce: "true"
      validate:
        cel:
          expressions:
            - expression: >-
                object.spec.containers.all(container,
                  has(container.resources) &&
                  has(container.resources.limits) &&
                  has(container.resources.limits.cpu) &&
                  has(container.resources.limits.memory)
                )
              message: "All containers must have CPU and memory limits specified"

    - name: require-requests
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  compliance.sovereign-demo/enforce: "true"
      validate:
        cel:
          expressions:
            - expression: >-
                object.spec.containers.all(container,
                  has(container.resources) &&
                  has(container.resources.requests) &&
                  has(container.resources.requests.cpu) &&
                  has(container.resources.requests.memory)
                )
              message: "All containers must have CPU and memory requests specified"
