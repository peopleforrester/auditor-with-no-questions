# ABOUTME: ArgoCD Application for demo target workload
# ABOUTME: Sync wave 5 - deployed after all security tooling is ready

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: sovereign-compliance-demo
    compliance.sovereign/component: demo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/michaelrishiforrester/auditor-with-no-questions.git
    targetRevision: main
    path: demo/target-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
